<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Banner Image Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #111; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; }
        .upload-section { background: #222; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .upload-area { border: 2px dashed #6366f1; padding: 40px; text-align: center; border-radius: 10px; margin: 20px 0; }
        .upload-area:hover { border-color: #8b5cf6; background: #333; }
        input[type="file"] { margin: 10px 0; }
        button { background: #6366f1; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5856eb; }
        .preview { margin: 20px 0; }
        .preview img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .result { background: #333; padding: 15px; border-radius: 8px; margin: 10px 0; white-space: pre-wrap; }
        .success { border-left: 4px solid #10b981; }
        .error { border-left: 4px solid #ef4444; }
        .info { border-left: 4px solid #3b82f6; }
        .sizes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .size-card { background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; }
        .size-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Blog Banner Image Upload System</h1>
        <p>Test the enhanced image upload functionality for blog banners</p>

        <div class="upload-section">
            <h2>📤 Upload Banner Image</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p>📁 Click here to select a banner image</p>
                <p>Supports: JPEG, PNG, GIF, WebP (Max 5MB)</p>
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewAndUpload(this)">
            </div>
            
            <div id="preview" class="preview" style="display: none;">
                <h3>Preview:</h3>
                <img id="previewImg" alt="Preview">
            </div>

            <button onclick="uploadImage()" id="uploadBtn" style="display: none;">
                🚀 Upload Banner Image
            </button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let selectedFile = null;

        function previewAndUpload(input) {
            const file = input.files[0];
            if (!file) return;

            selectedFile = file;

            // Show preview
            const preview = document.getElementById('preview');
            const previewImg = document.getElementById('previewImg');
            const uploadBtn = document.getElementById('uploadBtn');

            previewImg.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            uploadBtn.style.display = 'block';

            addResult('info', `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
        }

        async function uploadImage() {
            if (!selectedFile) {
                addResult('error', 'No file selected');
                return;
            }

            const formData = new FormData();
            formData.append('image', selectedFile);

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.textContent = '⏳ Uploading...';
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/upload_endpoint.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    addResult('success', `✅ Upload Successful!\n\nOriginal URL: ${result.url}\nFilename: ${result.filename}\n\nGenerated Sizes: ${Object.keys(result.sizes || {}).length}`);
                    
                    if (result.sizes) {
                        showImageSizes(result.sizes, result.url);
                    }
                } else {
                    addResult('error', `❌ Upload Failed: ${result.error}`);
                }
            } catch (error) {
                addResult('error', `❌ Network Error: ${error.message}`);
            } finally {
                uploadBtn.textContent = '🚀 Upload Banner Image';
                uploadBtn.disabled = false;
            }
        }

        function showImageSizes(sizes, originalUrl) {
            const resultsDiv = document.getElementById('results');
            
            let sizesHtml = '<div class="result success"><h3>📏 Generated Image Sizes:</h3><div class="sizes-grid">';
            
            // Add original
            sizesHtml += `
                <div class="size-card">
                    <img src="${originalUrl}" alt="Original">
                    <h4>Original</h4>
                    <p>Full Resolution</p>
                </div>
            `;

            // Add generated sizes
            for (const [sizeName, sizeData] of Object.entries(sizes)) {
                sizesHtml += `
                    <div class="size-card">
                        <img src="${sizeData.url}" alt="${sizeName}">
                        <h4>${sizeName.charAt(0).toUpperCase() + sizeName.slice(1)}</h4>
                        <p>${sizeData.width}×${sizeData.height}</p>
                        <p>${(sizeData.filesize / 1024).toFixed(1)} KB</p>
                    </div>
                `;
            }
            
            sizesHtml += '</div></div>';
            resultsDiv.innerHTML = sizesHtml + resultsDiv.innerHTML;
        }

        function addResult(type, message) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `<strong>Banner Upload Test</strong><br>${message}`;
            resultsDiv.appendChild(resultDiv);
        }

        // Test API connection on load
        fetch('/api/blogs')
            .then(response => response.json())
            .then(data => {
                addResult('success', '✅ API Connection Test: Blog API is working');
            })
            .catch(error => {
                addResult('error', `❌ API Connection Test Failed: ${error.message}`);
            });
    </script>
</body>
</html>
