<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian D'Rozario Portfolio - Backend Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .status {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .api-test {
            margin: 20px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .contact-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Julian D'Rozario Portfolio - Backend Demo</h1>
        
        <div class="status">
            <h3>✅ Backend Status: <span id="backend-status">Checking...</span></h3>
            <p>API URL: <code>http://localhost:8001/api/</code></p>
            <p>FastAPI Docs: <a href="http://localhost:8001/docs" target="_blank" style="color: #FFE082;">http://localhost:8001/docs</a></p>
        </div>

        <div class="api-test">
            <h3>🧪 API Testing</h3>
            <button onclick="testHealthCheck()">Test Health Check</button>
            <button onclick="testStatusCheck()">Create Status Check</button>
            <button onclick="getStatusChecks()">Get All Status Checks</button>
            <div id="api-result" class="result"></div>
        </div>

        <div class="contact-form">
            <h3>📞 Contact Form Demo</h3>
            <form onsubmit="submitContact(event)">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
            <div id="contact-result" class="result"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api';

        // Check backend status on load
        async function checkBackendStatus() {
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();
                document.getElementById('backend-status').textContent = 
                    data.status === 'healthy' ? '🟢 Online' : '🟡 Partial';
                document.getElementById('backend-status').style.color = '#4CAF50';
            } catch (error) {
                document.getElementById('backend-status').textContent = '🔴 Offline';
                document.getElementById('backend-status').style.color = '#f44336';
            }
        }

        async function testHealthCheck() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('api-result').textContent = 
                    'Health Check Result:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('api-result').textContent = 
                    'Error: ' + error.message;
            }
        }

        async function testStatusCheck() {
            try {
                const response = await fetch(`${API_BASE}/status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        client_name: `Test Client ${new Date().getTime()}`
                    })
                });
                const data = await response.json();
                document.getElementById('api-result').textContent = 
                    'Status Check Created:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('api-result').textContent = 
                    'Error: ' + error.message;
            }
        }

        async function getStatusChecks() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                const data = await response.json();
                document.getElementById('api-result').textContent = 
                    'All Status Checks:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('api-result').textContent = 
                    'Error: ' + error.message;
            }
        }

        async function submitContact(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const contactData = {
                name: formData.get('name'),
                email: formData.get('email'),
                message: formData.get('message')
            };

            try {
                const response = await fetch(`${API_BASE}/contact`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(contactData)
                });
                const data = await response.json();
                document.getElementById('contact-result').textContent = 
                    'Contact Form Result:\n' + JSON.stringify(data, null, 2);
                
                // Clear form on success
                if (data.success) {
                    event.target.reset();
                }
            } catch (error) {
                document.getElementById('contact-result').textContent = 
                    'Error: ' + error.message;
            }
        }

        // Check status when page loads
        checkBackendStatus();
    </script>
</body>
</html>
